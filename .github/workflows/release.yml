name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 fetches the full history and tags so `git describe --tags`
      # in `make dist` resolves the release version to inject into the binaries,
      # and so goreleaser can compute the changelog range.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test (race)
        run: go test -race ./...

      # Build the SAME artifact as the documented install path (OPERATIONS §8):
      # `make dist` produces dist/infrabroker-<version>.tar.gz with all six
      # binaries (incl. control-plane, which the shipped systemd unit execs),
      # version-injected, plus deploy/ and the example configs. goreleaser
      # attaches it to the release via release.extra_files; its own archives
      # live in dist-goreleaser/ so `release --clean` never wipes this one.
      - name: Build installer tarball
        run: make dist

      # checksums.txt is goreleaser's (covers the per-platform archives); the
      # installer tarball gets its own sidecar to avoid the name collision.
      - name: Checksum installer tarball
        run: cd dist && sha256sum infrabroker-*.tar.gz > installer.sha256

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single owner of the GitHub release: goreleaser creates it, uploads the
      # per-platform archives + checksums.txt + the installer tarball, pushes
      # the per-arch images to ghcr and stitches the multi-arch manifests.
      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish server.json to the MCP Registry after the image is live. The registry
  # validates OCI ownership by pulling the image referenced in server.json and
  # reading its io.modelcontextprotocol.server.name label, so this MUST run after
  # the release job has pushed ghcr.io/luisgf/infrabroker:<version>. Auth is
  # GitHub Actions OIDC (id-token) — it proves the io.github.luisgf namespace
  # belongs to this repo's owner, so no PAT or stored secret is needed.
  mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pinned publisher from github.com/modelcontextprotocol/registry; the
      # installed binary is named `publisher`.
      - name: Install mcp-publisher
        run: go install github.com/modelcontextprotocol/registry/cmd/publisher@v1.7.9

      # login writes a short-lived registry token consumed by publish in the same
      # job. server.json is the tagged revision (checkout defaults to the tag ref),
      # so its version/OCI identifier already match the release just published.
      - name: Publish server.json to the MCP Registry
        run: |
          publisher login github-oidc
          publisher publish
